name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      # Generated code (v1/**/*.pb.go) is committed → build + vet is the real check.
      - name: build + vet
        run: |
          go build ./...
          go vet ./...
      # NOTE: `make verify` (regen proto + git diff) cần PIN đúng tooling
      # (protoc 3.12.4 + protoc-gen-go v1.36.11) vì header .pb.go nhúng version →
      # diff sẽ fail nếu runner dùng version khác. Bật khi CI image pin đúng.
