syntax = "proto3";

package fnbpos.fnb.v1;

option go_package = "github.com/rp-game/fnbpos-pb/v1/fnb";

import "common/v1/envelope.proto";

// fnb.menu.query.v1 (request/reply) — pos BOOTSTRAP/SYNC read-model (không dùng trên hot-path bán).
message MenuQueryRequest {
  fnbpos.common.v1.Envelope envelope = 1;
  string outlet_id = 2;
  string locale = 3;
}

message MenuQueryResponse {
  fnbpos.common.v1.Envelope envelope = 1;
  uint64 version = 2;                   // watermark: version cao nhất của snapshot (D3)
  repeated MenuItem items = 3;
}

message MenuItem {
  string menu_item_id = 1;
  string name = 2;
  fnbpos.common.v1.Money price = 3;        // giá net
  repeated string channels = 4;           // allow-list: pos,kiosk,in_seat,pickup,online
  bool active = 5;
  uint64 version = 6;                      // monotonic per (outlet, menu_item) — D3
  string tax_group = 7;                    // nhóm thuế suất (DEC-05: đa suất per-line)
  fnbpos.common.v1.Money original_price = 8;  // giá gạch KM (nếu có)
}

// Ba event nuôi read-model của pos — CÙNG một `version` đơn điệu per (outlet, menu_item) (D3).

// fnb.menu.changed — thêm/sửa/xoá (deleted=tombstone).
// v0.3.0: FAT event — mang đủ dữ liệu nuôi read-model (pos KHÔNG cần query lại). Biến thể/nhóm modifier
// đi dạng JSON (jsonb read-model) để giữ nguyên cấu trúc lồng — envelope/wire vẫn là PROTO.
message MenuChanged {
  fnbpos.common.v1.Envelope envelope = 1;
  string outlet_id = 2;
  string menu_item_id = 3;
  uint64 version = 4;
  bool deleted = 5;                       // tombstone: giữ tới hết cửa sổ replay
  string code = 6;
  string name = 7;
  fnbpos.common.v1.Money price = 8;       // giá net (amount_minor + currency)
  string tax_group = 9;
  repeated string channels = 10;          // allow-list kênh (pos,kiosk,…)
  bool active = 11;
  bool is_combo = 12;
  string variations_json = 13;            // jsonb biến thể (G1-03)
  string modifier_groups_json = 14;       // jsonb nhóm modifier (G1-04)
}

// fnb.price.changed — đổi giá/thuế-suất.
message PriceChanged {
  fnbpos.common.v1.Envelope envelope = 1;
  string outlet_id = 2;
  string menu_item_id = 3;
  fnbpos.common.v1.Money price = 4;
  uint64 version = 5;
}

// fnb.item.availability.changed — 86 / re-open.
message ItemAvailabilityChanged {
  fnbpos.common.v1.Envelope envelope = 1;
  string outlet_id = 2;
  string menu_item_id = 3;
  bool available = 4;
  uint64 version = 5;
}
