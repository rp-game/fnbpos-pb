syntax = "proto3";

package fnbpos.fnb.v1;

option go_package = "github.com/rp-game/fnbpos-pb/v1/fnb";

import "common/v1/envelope.proto";

// fnb.stock.shortfall — fnb -> pos: trừ kho fail / không đủ NVL sau khi đã bán.
// Đường báo ngược cho saga bán→trừ-kho (A6). Payload đầy đủ (lot/qty thiếu) bổ sung ở G0 (additive).
message StockShortfall {
  fnbpos.common.v1.Envelope envelope = 1;
  string outlet_id = 2;
  string warehouse_id = 3;
  string order_id = 4;
  string sale_line_id = 5;
  string menu_item_id = 6;
  string material_id = 7;                  // v0.3.0: NVL bị âm (impl trừ theo material)
  fnbpos.common.v1.Quantity on_hand = 8;   // v0.3.0: tồn sau khi trừ (âm)
}

// fnb.stock.recipe_missing — fnb -> pos/ops: món ĐÃ BÁN nhưng KHÔNG có recipe (BOM) → không trừ được kho.
message RecipeMissing {
  fnbpos.common.v1.Envelope envelope = 1;
  string outlet_id = 2;
  string order_id = 3;
  string menu_item_id = 4;
}
